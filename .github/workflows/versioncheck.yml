name: VersionCheck
run-name: Publishing latest version number
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true
  
on: [push]
jobs:
    read-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.read_version.outputs.value }}
        steps:
            - uses: actions/checkout@v4
            - uses: SebRollen/toml-action@v1.2.0
              id: "read_version"
              with:
                file: "Cargo.toml"
                field: "package.version"
    publish-version:
        runs-on: ubuntu-latest
        needs: read-version
        steps:
            - uses: actions/checkout@v4
            - name: "Generate Site"
              run: |
                mkdir api
                mkdir api/version
                cat > api/version/status.json << EOF
                {
                    "version": "${{ needs.read-version.outputs.version }}",
                    "commit": "${{ github.sha }}"
                }
                EOF

            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                path: api
            - uses: actions/deploy-pages@v4
